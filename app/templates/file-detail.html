<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draft_v1.docx // AURA.OS Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --aura-bg: #e5e2d9; 
            --aura-accent: #1a1a1a;
            --aura-glass: rgba(255, 255, 255, 0.3);
            --aura-border: rgba(0, 0, 0, 0.05);
        }
        
        /* Unified Typography */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--aura-bg); 
            color: var(--aura-accent); 
            -webkit-font-smoothing: antialiased;
        }
        
        .mono { 
            font-family: 'JetBrains Mono', monospace; 
            letter-spacing: -0.02em;
        }

        [x-cloak] { display: none !important; }

        /* Minimalist Scrollbar to match Dashboard */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-10 lg:p-16" x-data="detailManager" x-cloak>

    <main class="max-w-7xl mx-auto h-full">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10 items-stretch">
            
            <div class="lg:col-span-2 flex flex-col gap-6">
                <div class="bg-white/40 border border-black/5 rounded-[2.5rem] p-12 flex flex-col items-center justify-center flex-grow backdrop-blur-md">
                    <div class="w-24 h-24 bg-black rounded-3xl flex items-center justify-center mb-8 shadow-2xl transition-transform hover:scale-105">
                        <svg class="text-white" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                        </svg>
                    </div>
                    <h2 class="text-4xl font-bold tracking-tighter mb-2 text-center" x-text="fileData.name"></h2>
                    <span class="text-xs mono font-bold text-black/40 uppercase tracking-[0.2em]" x-text="fileData.type + ' // ' + fileData.size"></span>
                    
                    <div class="flex flex-wrap justify-center gap-4 mt-10">
                        <button @click="downloadFile" class="h-12 px-8 bg-black text-white rounded-xl text-[11px] mono font-bold uppercase tracking-widest hover:scale-105 transition-all">Download</button>
                        <button @click="showRenameModal=!showRenameModal" class="h-12 px-8 border border-black/10 rounded-xl text-[11px] mono font-bold uppercase tracking-widest hover:bg-white transition-all">Rename</button>
                        <button @click="showDeleteModal" class="h-12 px-6 border border-red-200 text-red-500 rounded-xl text-[11px] mono font-bold uppercase tracking-widest hover:bg-red-50 transition-all">Delete</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="bg-black/5 p-6 rounded-2xl border border-black/5">
                        <span class="block text-[10px] mono font-bold text-black/30 uppercase tracking-widest mb-2">Created</span>
                        <span class="text-sm font-bold tracking-tight" x-text="fileData.createdAt"></span>
                    </div>
                    <div class="bg-black/5 p-6 rounded-2xl border border-black/5">
                        <span class="block text-[10px] mono font-bold text-black/30 uppercase tracking-widest mb-2">Last Modified</span>
                        <span class="text-sm font-bold tracking-tight" x-text="fileData.updatedAt"></span>
                    </div>
                </div>
            </div>

            <div class="flex flex-col h-full">
                <div class="bg-white/60 border border-black/5 rounded-[2.5rem] p-8 flex flex-col h-full shadow-sm backdrop-blur-md">
                    <div class="flex justify-between items-center mb-5">
                        <h3 class="font-bold text-xl tracking-tighter" x-text="grantMode ? 'Grant Access' : 'Access Control'"></h3>
                        <div class="flex items-center gap-3">
                            <button @click="grantMode = !grantMode" 
                                    :class="grantMode ? 'bg-indigo-600 text-white' : 'bg-black/5 text-black/40'"
                                    class="text-[9px] mono font-bold px-3 py-1.5 rounded-lg transition-all uppercase tracking-widest">
                                <span x-text="grantMode ? 'Back' : 'Add User'"></span>
                            </button>
                            <span x-show="!grantMode && totalUserPages > 1" class="text-[10px] mono font-bold bg-black/5 px-2 py-1 rounded text-black/40" x-text="(currentUserPage+1)+'/'+totalUserPages"></span>
                        </div>
                    </div>
                
                    <div class="relative mb-4">
                        <input type="text" 
                               x-model="searchQuery" 
                               @keydown.enter="grantMode ? searchEmail() : searchUser()" 
                               :placeholder="grantMode ? 'Enter email address...' : 'Type & press ENTER to search'" 
                               class="w-full bg-black/5 border-none rounded-xl py-3 px-4 text-[11px] mono font-bold focus:bg-white focus:ring-1 focus:ring-black outline-none transition-all placeholder:text-black/20">
                    </div>
                
                    <div class="flex-grow flex flex-col justify-between">
                        <div class="space-y-2">
                            <template x-if="!grantMode">
                                <div class="space-y-2">
                                    <template x-for="user in userList" :key="user.id">
                                        <div class="flex items-center justify-between p-3 rounded-2xl border bg-white/40 border-black/5 transition-all min-h-[64px]">
                                            <div class="flex items-center gap-3">
                                                <div class="w-9 h-9 rounded-xl flex-shrink-0 flex items-center justify-center text-[11px] font-bold border border-black/5 shadow-sm bg-white" :class="user.color" x-text="user.name.charAt(0)"></div>
                                                <div class="flex flex-col justify-center min-h-[36px]">
                                                    <p class="text-xs font-bold tracking-tight leading-tight" x-text="user.name"></p>
                                                    <p class="text-[9px] mono font-medium text-black/30 truncate max-w-[120px]" x-text="user.email"></p>
                                                </div>
                                            </div>
                                            <button @click="openRevokeModal(user)" class="text-[9px] mono font-bold text-red-400 hover:text-red-600 px-2 py-1 rounded-lg hover:bg-red-50 transition-all uppercase">Revoke</button>
                                        </div>
                                    </template>
                                </div>
                            </template>
                
                            <template x-if="grantMode">
                                <div class="space-y-2">
                                    <template x-for="foundUser in foundUsers" :key="foundUser.id">
                                        <div class="flex items-center justify-between p-3 rounded-2xl border bg-white/40 border-black/5 transition-all min-h-[64px]">
                                            <div class="flex items-center gap-3">
                                                <div class="w-9 h-9 rounded-xl flex-shrink-0 flex items-center justify-center text-[11px] font-bold border border-black/5 shadow-sm bg-white text-indigo-600" x-text="foundUser.name.charAt(0)"></div>
                                                <div class="flex flex-col justify-center min-h-[36px]">
                                                    <p class="text-xs font-bold tracking-tight leading-tight" x-text="foundUser.name"></p>
                                                    <p class="text-[9px] mono font-medium text-black/30 truncate max-w-[120px]" x-text="foundUser.email"></p>
                                                </div>
                                            </div>
                                            <button @click="grantAccess(foundUser.id)" class="text-[9px] mono font-bold bg-indigo-600 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-700 transition-all uppercase">Grant</button>
                                        </div>
                                    </template>
                                    
                                    <div x-show="foundUsers.length === 0" class="py-12 text-center text-[10px] mono text-black/20 tracking-widest">
                                        ENTER EMAIL TO FIND USER
                                    </div>
                                </div>
                            </template>
                        </div>
                
                        <div class="mt-auto">
                            <div class="flex gap-2 mb-4" x-show="totalUserPages > 1 && !grantMode">
                                <button @click="currentUserPage--" :disabled="currentUserPage === 0" class="flex-1 py-3 bg-black/5 rounded-xl text-[10px] mono font-bold disabled:opacity-20 hover:bg-black/10 transition-colors uppercase">Prev</button>
                                <button @click="currentUserPage++" :disabled="currentUserPage >= totalUserPages - 1" class="flex-1 py-3 bg-black/5 rounded-xl text-[10px] mono font-bold disabled:opacity-20 hover:bg-black/10 transition-colors uppercase">Next</button>
                            </div>
                
                            <button @click="resetShareModal" class="w-full py-4 bg-black text-white hover:opacity-90 transition-all rounded-xl text-[11px] mono font-bold uppercase tracking-[0.2em]">
                                Share File Link
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div x-show="showShareModal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/20 backdrop-blur-sm" x-transition.opacity>
        <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full shadow-2xl border border-black/5" @click.away="showShareModal = false">
            
            <h3 class="text-2xl font-bold tracking-tighter mb-1" x-text="linkGenerated ? 'Link Generated' : 'Share Link'"></h3>
            <p class="text-[10px] mono font-bold text-black/30 uppercase mb-8" x-text="linkGenerated ? 'Public access active' : 'Configure network visibility'"></p>

            <div class="space-y-6" x-show="!linkGenerated">
                <div>
                    <label class="block text-[10px] mono font-bold text-black/40 uppercase tracking-widest mb-2">Expiry Window</label>
                    <select x-model="shareForm.expiry" class="w-full bg-black/5 border-none rounded-xl py-4 px-4 text-[11px] mono font-bold outline-none cursor-pointer">
                        <option value="1">24 HOURS</option>
                        <option value="7">7 DAYS</option>
                        <option value="0">NEVER</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] mono font-bold text-black/40 uppercase tracking-widest mb-2">Key Phrase (Optional)</label>
                    <input type="password" x-model="shareForm.password" placeholder="••••••••" class="w-full bg-black/5 border-none rounded-xl py-4 px-4 text-[11px] mono outline-none focus:ring-1 focus:ring-black transition-all">
                </div>
                <button @click="generateLink" class="w-full py-4 bg-black text-white text-[11px] mono font-bold uppercase tracking-[0.2em] rounded-xl active:scale-95 transition-all">Generate URL</button>
            </div>

            <div class="space-y-6" x-show="linkGenerated" x-transition>
                <div class="bg-black/5 p-5 rounded-2xl border border-black/5">
                    <p class="text-[9px] mono font-bold text-black/30 mb-3 uppercase tracking-widest">Public Endpoint</p>
                    <p class="text-[12px] mono font-bold text-indigo-600 break-all leading-relaxed" x-text="generatedUrl"></p>
                </div>
                <div class="flex gap-3">
                    <button @click="copyToClipboard" class="flex-grow py-4 bg-black text-white text-[11px] mono font-bold uppercase tracking-widest rounded-xl hover:opacity-90 transition-all" x-text="copyText"></button>
                    <button @click="showShareModal = false" class="px-6 py-4 bg-black/5 text-[11px] mono font-bold uppercase rounded-xl hover:bg-black/10 transition-colors">Exit</button>
                </div>
            </div>
        </div>
    </div>

    <div x-show="showRenameModal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/20 backdrop-blur-sm" x-transition.opacity>
        <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full shadow-2xl border border-black/5" @click.away="showRenameModal = false">
            <h3 class="text-2xl font-bold tracking-tighter mb-1">Rename Resource</h3>
            <p class="text-[10px] mono font-bold text-black/30 uppercase mb-8">Update the system identifier</p>
    
            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] mono font-bold text-black/40 uppercase tracking-widest mb-2">New Filename</label>
                    <input type="text" x-model="newFileName" :placeholder="fileData.name" 
                           class="w-full bg-black/5 border-none rounded-xl py-4 px-4 text-[11px] mono font-bold outline-none focus:ring-1 focus:ring-black transition-all">
                </div>
    
                <div class="flex gap-3">
                    <button @click="showRenameModal = false" class="flex-1 py-4 bg-black/5 text-[10px] mono font-bold uppercase rounded-xl">Cancel</button>
                    <button @click="confirmRename" class="flex-1 py-4 bg-black text-white text-[10px] mono font-bold uppercase tracking-widest rounded-xl active:scale-95 transition-all">Save Changes</button>
                </div>
            </div>
        </div>
    </div>
    
    <div x-show="showDeleteModal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/20 backdrop-blur-sm" x-transition.opacity>
        <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full shadow-2xl border border-red-500/10" @click.away="showDeleteModal = false">
            <div class="w-12 h-12 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center mb-6">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </div>
            
            <h3 class="text-2xl font-bold tracking-tighter mb-1 text-red-600">Delete Resource?</h3>
            <p class="text-[10px] mono font-bold text-black/30 uppercase mb-8">This action is irreversible and will purge data from the node.</p>
    
            <div class="bg-red-50 p-4 rounded-xl mb-8 border border-red-100">
                <p class="text-[10px] mono font-bold text-red-400 uppercase mb-1">Target</p>
                <p class="text-xs font-bold text-red-700 truncate" x-text="fileData.name"></p>
            </div>
    
            <div class="flex gap-3">
                <button @click="showDeleteModal = false" class="flex-1 py-4 bg-black/5 text-[10px] mono font-bold uppercase rounded-xl">Abort</button>
                <button @click="confirmDelete" class="flex-1 py-4 bg-red-600 text-white text-[10px] mono font-bold uppercase tracking-widest rounded-xl active:scale-95 transition-all shadow-lg shadow-red-200">Confirm Purge</button>
            </div>
        </div>
    </div>
    <div x-show="showRevokeModal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/20 backdrop-blur-sm" x-transition.opacity>
        <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full shadow-2xl border border-black/5" @click.away="showRevokeModal = false">
            
            <div class="w-12 h-12 bg-orange-50 text-orange-500 rounded-2xl flex items-center justify-center mb-6">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M17 8l5 5m0-5l-5 5"/>
                </svg>
            </div>
            
            <h3 class="text-2xl font-bold tracking-tighter mb-1">Revoke Access?</h3>
            <p class="text-[10px] mono font-bold text-black/30 uppercase mb-8">User will immediately lose connection to this resource.</p>
    
            <div class="bg-black/5 p-4 rounded-xl mb-8 border border-black/5 flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-white flex items-center justify-center text-[10px] font-bold border border-black/5" x-text="userToRevoke.name.charAt(0)"></div>
                <div>
                    <p class="text-[10px] mono font-bold text-black/40 uppercase mb-0.5">Target Identity</p>
                    <p class="text-xs font-bold" x-text="userToRevoke.name"></p>
                </div>
            </div>
    
            <div class="flex gap-3">
                <button @click="showRevokeModal = false" class="flex-1 py-4 bg-black/5 text-[10px] mono font-bold uppercase rounded-xl">Cancel</button>
                <button @click="revokeAccess" class="flex-1 py-4 bg-black text-white text-[10px] mono font-bold uppercase tracking-widest rounded-xl active:scale-95 transition-all">Confirm Revoke</button>
            </div>
        </div>
    </div>

    <script src="{{url_for('static',path='js/base.js')}}"></script>
    <script src="{{url_for('static',path='js/detail.js')}}"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/csp@3.x.x/dist/cdn.min.js"></script>

</body>
</html>
