<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA // INTELLIGENT STORAGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --aura-bg: #e5e2d9;
            --aura-sidebar-bg: #dfdbcf;
            --aura-accent: #1a1a1a;
            --aura-white: #ffffff;
            --aura-success: #10b981;
            --aura-glass: rgba(255, 255, 255, 0.3);
            --aura-border: rgba(0, 0, 0, 0.05);
            --aura-text-mute: rgba(0, 0, 0, 0.4);
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--aura-bg); color: var(--aura-accent); }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Component Transitions */
        .sidebar { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .aura-card-base {
            height: 13rem;
            min-width: 240px;
            max-width: 340px;
            flex: 1 1 240px;
            background: var(--aura-glass);
            border: 1px solid var(--aura-border);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        .aura-list-card {
            width: 100%;
            background: var(--aura-glass);
            border: 1px solid var(--aura-border);
            transition: all 0.3s ease, width 0.3s ease;
        }

        .aura-card-base:hover, .aura-list-card:hover {
            background: var(--aura-white);
            border-color: var(--aura-accent);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden" x-data="pageManager">

    <aside class="sidebar h-full flex flex-col z-20 border-r border-black/5" 
           :class="sidebarExpanded ? 'w-[260px]' : 'w-[80px]'"
           style="background-color: var(--aura-sidebar-bg);">
        
        <div class="h-24 flex items-center px-7 mb-4 cursor-pointer" @click="sidebarExpanded = !sidebarExpanded">
            <div class="min-w-[24px] h-6 bg-black rounded flex items-center justify-center text-[10px] text-white font-bold">A</div>
            <span class="ml-4 font-bold tracking-tighter text-xl whitespace-nowrap" x-show="sidebarExpanded" x-transition>AURA.OS</span>
        </div>

        <!-- sidebar -->
        <nav class="flex-1 px-4 space-y-2">
            <button @click="currentView = 'dashboard'" 
                    :class="currentView === 'dashboard' ? 'bg-black text-white' : 'text-black/40 hover:text-black'"
                    class="w-full flex items-center h-12 px-3 rounded-xl transition-all">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span class="ml-4 font-medium text-sm whitespace-nowrap" x-show="sidebarExpanded">Dashboard</span>
            </button>
            <button @click="currentView = 'shared'" 
                    :class="currentView === 'shared' ? 'bg-black text-white' : 'text-black/40 hover:text-black'"
                    class="w-full flex items-center h-12 px-3 rounded-xl transition-all">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                <span class="ml-4 font-medium text-sm whitespace-nowrap" x-show="sidebarExpanded">Shared</span>
            </button>
        </nav>

        <div class="p-4 border-t border-black/5 bg-black/5 flex items-center justify-center">
            <div class="w-2.5 h-2.5 rounded-full animate-pulse" style="background-color: var(--aura-success);"></div>
            <span class="ml-4 text-[10px] mono font-bold uppercase" style="color: var(--aura-success);" x-show="sidebarExpanded">System Optimal</span>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <!-- header -->
        <header class="h-24 px-10 flex items-center justify-between gap-8">
            <div class="flex-1 max-w-2xl relative">
                <input type="text" placeholder="Search resources..." class="w-full bg-black/5 border-none rounded-2xl py-3 px-6 text-sm font-medium focus:bg-white outline-none transition-all">
            </div>
            <div class="flex items-center gap-4">
                <input type="file" class="hidden" x-ref="fileInput" @change="onFileSelect">
                <button class="h-11 px-6 bg-black text-white rounded-xl text-xs font-bold uppercase tracking-widest" @click="openFilePicker">Upload</button>
                <div class="relative" @click.away="ProfileDropdownOpen = false">
                    <button 
                        @click="ProfileDropdownOpen = !ProfileDropdownOpen" 
                        class="w-11 h-11 rounded-full bg-white border border-black/5 flex items-center justify-center font-bold text-xs hover:border-black transition-all active:scale-95"
                        :class="ProfileDropdownOpen ? 'border-black ring-4 ring-black/5' : ''"
                    >
                        JD
                    </button>
                
                    <div 
                        x-show="ProfileDropdownOpen" 
                        x-transition:enter="transition ease-out duration-200"
                        x-transition:enter-start="opacity-0 translate-y-2"
                        x-transition:enter-end="opacity-100 translate-y-0"
                        x-transition:leave="transition ease-in duration-150"
                        x-transition:leave-start="opacity-100 translate-y-0"
                        x-transition:leave-end="opacity-0 translate-y-2"
                        class="absolute right-0 mt-3 w-60 bg-white/90 backdrop-blur-xl border border-black/10 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] z-50 overflow-hidden"
                        style="display: none;"
                    >
                        <div class="px-5 py-4 border-b border-black/5">
                            <p class="text-[9px] mono font-bold text-black/40 uppercase tracking-[0.2em] mb-1">Authenticated User</p>
                            <p class="text-sm font-bold truncate tracking-tight">JANE_DOE_01</p>
                        </div>
                
                        <div class="p-2">
                            <button class="w-full flex items-center justify-between px-3 py-3 rounded-xl hover:bg-black hover:text-white transition-all group">
                                <div class="flex items-center gap-3">
                                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                                    <span class="text-[11px] mono font-bold uppercase">Appearance</span>
                                </div>
                                <span class="text-[9px] mono opacity-40 group-hover:opacity-100">LIGHT</span>
                            </button>
                
                            <button class="w-full flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-black hover:text-white transition-all group">
                                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15V3m0 12l-4-4m4 4l4-4M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"/></svg>
                                <span class="text-[11px] mono font-bold uppercase">System Prefs</span>
                            </button>
                        </div>
                
                        <div class="p-2 border-t border-black/5 bg-black/[0.02]">
                            <button class="w-full flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-red-600 hover:text-white transition-all group">
                                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                                <span class="text-[11px] mono font-bold uppercase">Logout</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </header>


        <!-- main content panel -->

        <!-- dashboard view -->
        <div x-show="currentView === 'dashboard'" class="flex-1 px-10 overflow-y-auto pb-10">
            <div class="mb-10 flex justify-between items-center">
                <div>
                    <h2 class="text-3xl font-bold tracking-tight mb-1">My Workspace</h2>
                    <p class="text-sm opacity-40 font-medium">Manage individual files or curated collections</p>
                </div>
                <div class="p-1 rounded-xl flex bg-black/5">
                    <button @click="dbTab = 'files'" :class="dbTab === 'files' ? 'bg-white shadow-sm text-black' : 'text-black/40'" class="px-4 py-2 rounded-lg text-[10px] mono font-bold uppercase transition-all">Files</button>
                    <button @click="dbTab = 'collections'" :class="dbTab === 'collections' ? 'bg-white shadow-sm text-black' : 'text-black/40'" class="px-4 py-2 rounded-lg text-[10px] mono font-bold uppercase transition-all">Collections</button>
                </div>
            </div>

            <!-- files card template -->
            <div x-show="dbTab === 'files'" class="grid grid-cols-4 gap-6"">
                <template x-for="file in filesList" :key="file.id">
                    <div
                        class="file-card aura-card-base p-5 rounded-[1.5rem] flex flex-col h-52 group
                               border border-black/5 bg-white/30 hover:bg-white transition-all"
                    >
                        <!-- Top -->
                        <div class="flex justify-between items-start mb-4">
                            <div class="w-10 h-10 bg-black/5 rounded-xl flex items-center justify-center flex-shrink-0">
                                <svg class="text-black/40"
                                     width="20" height="20"
                                     fill="none" stroke="currentColor"
                                     stroke-width="2" viewBox="0 0 24 24">
                                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                                    <polyline points="14.5 2 14.5 7 20 7"/>
                                </svg>
                            </div>
                
                            <!-- optional actions -->
                            <div class="opacity-0 group-hover:opacity-100 transition-opacity">
                                <button class="p-2 rounded-lg hover:bg-black/5">
                                    <svg xmlns="http://www.w3.org/2000/svg"
                                         width="14" height="14"
                                         fill="none" stroke="currentColor"
                                         stroke-width="2" viewBox="0 0 24 24">
                                        <path d="M12 5v14M5 12h14"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                
                        <!-- Content -->
                        <div class="mt-auto">
                            <!-- filename -->
                            <h3
                                class="font-bold text-[15px] mb-1 truncate
                                       group-hover:text-indigo-600 transition-colors"
                                x-text="file.name"
                            ></h3>
                
                            <!-- type + size -->
                            <div class="flex items-center gap-3">
                                <span
                                    class="text-[10px] mono font-bold bg-zinc-200 px-2 py-0.5 rounded uppercase"
                                    x-text="file.type || 'FILE'"
                                ></span>
                
                                <span
                                    class="text-[10px] mono font-semibold text-black/40"
                                    x-text="file.size || file.meta"
                                ></span>
                            </div>
                
                            <!-- updated -->
                            <div class="mt-4 pt-3 border-t border-black/5">
                                <span
                                    class="text-[9px] font-semibold text-black/30 uppercase tracking-wider"
                                    x-text="file.updatedAt || '—'"
                                ></span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
            
            <!-- collection card  -->
            <div x-show="dbTab === 'collections'" class="flex flex-wrap gap-6">
                <template x-for="col in collectionsList" :key="col.id">
                    <div class="collection-card aura-card-base p-1 rounded-2xl cursor-pointer">
                        <div class="bg-black/5 rounded-xl p-6 h-full flex flex-col justify-between">
                            <div class="flex justify-between items-start">
                                <div class="w-8 h-8 rounded-lg bg-black text-white flex items-center justify-center text-[10px] mono font-bold"
                                     x-text="col.id"></div>
                                <span class="text-[10px] mono font-bold bg-black text-white px-2 py-0.5 rounded uppercase"
                                      x-text="col.count + ' ITEMS'"></span>
                            </div>
            
                            <h3 class="font-bold text-lg tracking-tight" x-text="col.title"></h3>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- shared tab view -->
        <div x-show="currentView === 'shared'" class="flex-1 px-10 overflow-y-auto pb-10">
            <div class="mb-10 flex justify-between items-center">
                <div>
                    <h2 class="text-3xl font-bold tracking-tight mb-1">Shared Space</h2>
                    <p class="text-sm opacity-40 font-medium">Collaborative assets across the network</p>
                </div>
                <div class="p-1 rounded-xl flex bg-black/5">
                    <button @click="shTab = 'withme'" :class="shTab === 'withme' ? 'bg-white shadow-sm text-black' : 'text-black/40'" class="px-4 py-2 rounded-lg text-[10px] mono font-bold uppercase transition-all">With Me</button>
                    <button @click="shTab = 'byme'" :class="shTab === 'byme' ? 'bg-white shadow-sm text-black' : 'text-black/40'" class="px-4 py-2 rounded-lg text-[10px] mono font-bold uppercase transition-all">By Me</button>
                </div>
            </div>

            <!-- shared with me card templates -->
            <div x-show="shTab === 'withme'" class="flex flex-col gap-4">
                <template x-for="item in sharedWithMe" :key="item.id">
                    <div class="shared-card aura-list-card p-5 rounded-2xl flex items-center hover:bg-white transition-all shadow-sm">
            
                        <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center mr-6 flex-shrink-0">
                            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                            </svg>
                        </div>
            
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-sm truncate" x-text="item.name"></h3>
                            <span class="text-[9px] mono font-bold text-indigo-600 uppercase"
                                  x-text="item.meta"></span>
                        </div>
            
                        <div class="hidden sm:flex items-center gap-3 border-l border-black/5 px-8 ml-4 flex-shrink-0">
                            <div class="w-6 h-6 rounded-full bg-orange-200"></div>
                            <span class="text-[10px] font-bold uppercase"
                                  x-text="item.owner"></span>
                        </div>
            
                    </div>
                </template>
            </div>

            <!-- shared by me card tempalte -->
            <div x-show="shTab === 'byme'" class="flex flex-col gap-4">
                <template x-for="item in sharedByMe" :key="item.id">
                    <div class="shared-card aura-list-card p-5 rounded-2xl flex items-center hover:bg-white transition-all shadow-sm">
                    
                        <div class="w-12 h-12 bg-black/5 text-black/40 rounded-xl flex items-center justify-center mr-6 flex-shrink-0">
                            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                            </svg>
                        </div>
                    
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-sm truncate" x-text="item.name"></h3>
                            <span class="text-[9px] mono font-bold text-black/30 uppercase"
                                  x-text="item.meta"></span>
                        </div>
                    
                        <div class="hidden sm:flex items-center gap-3 border-l border-black/5 px-8 ml-4 flex-shrink-0">
                            <div class="w-6 h-6 rounded-full bg-black/10"></div>
                            <span class="text-[10px] font-bold uppercase"
                                  x-text="item.owner"></span>
                        </div>
                    
                    </div>
                </template>
            </div>
        </div>

    </main>

    <!-- template for file card in sahred tab -->
    <template id="tpl-shared-card">
        <div class="shared-card aura-list-card p-5 rounded-2xl flex items-center hover:bg-white transition-all shadow-sm">
            <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center mr-6 flex-shrink-0">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <div class="flex-1 min-w-0">
                <h3 class="font-bold text-sm truncate card-title">Marketing_Kit_2026</h3>
                <span class="text-[9px] mono font-bold text-indigo-600 uppercase card-subtitle">Incoming // Collection</span>
            </div>
            <div class="hidden sm:flex items-center gap-3 border-l border-black/5 px-8 ml-4 flex-shrink-0">
                <div class="w-6 h-6 rounded-full bg-orange-200"></div>
                <span class="text-[10px] font-bold text-black/60 uppercase card-owner">Sarah.OS</span>
            </div>
        </div>
    </template>

    <script src="{{url_for('static',path='js/base.js')}}"></script>

    <script src="{{url_for('static',path='js/index.js')}}"></script>
    
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/csp@3.x.x/dist/cdn.min.js"></script>
    
</body>
</html>
