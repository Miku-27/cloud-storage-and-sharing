<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.tailwindcss.com https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';">
    
    <title>AURA // REGISTER</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --aura-bg: #e5e2d9; --aura-accent: #1a1a1a; }
        body { font-family: 'Inter', sans-serif; background-color: var(--aura-bg); color: var(--aura-accent); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .auth-card { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.05); }
        [x-cloak] { display: none !important; }
        
        .spinner { 
            border: 2px solid rgba(255,255,255,0.3); 
            border-top: 2px solid white; 
            border-radius: 50%; 
            width: 14px; 
            height: 14px; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6" x-data="registerManager">

    <div class="w-full max-w-xl">
        <div class="auth-card p-10 rounded-[2.5rem] shadow-sm relative overflow-hidden">
            <div class="flex justify-between items-start mb-10">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">Create Identity</h1>
                    <p class="text-sm text-black/40 font-medium mt-1">Join the intelligent storage ecosystem</p>
                </div>
                <div class="text-right">
                    <span class="text-[10px] mono font-bold bg-emerald-500/10 text-emerald-600 px-3 py-1 rounded-full uppercase">Node: Open</span>
                </div>
            </div>
            
            <form @submit.prevent="handleRegister" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] mono font-bold text-black/40 uppercase mb-2 ml-1">UserName</label>
                        <input type="text" x-model="username" required placeholder="John Doe" 
                            class="w-full bg-black/5 border-none rounded-xl py-3 px-4 text-sm font-medium focus:bg-white transition-all outline-none border border-transparent focus:border-black/10">
                    </div>
                    <div>
                        <label class="block text-[10px] mono font-bold text-black/40 uppercase mb-2 ml-1">Network Email</label>
                        <input type="email" x-model="email" required placeholder="name@domain.com" 
                            class="w-full bg-black/5 border-none rounded-xl py-3 px-4 text-sm font-medium focus:bg-white transition-all outline-none border border-transparent focus:border-black/10">
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] mono font-bold text-black/40 uppercase mb-2 ml-1">Access Key</label>
                        <div class="relative flex items-center">
                            <input :type="showPassword ? 'text' : 'password'" x-model="password" required placeholder="••••••••" 
                                class="w-full bg-black/5 border-none rounded-xl py-3 px-4 pr-12 text-sm font-medium focus:bg-white transition-all outline-none border border-transparent focus:border-black/10">
                            <button type="button" @click="showPassword=!showPassword" class="absolute right-0 h-full px-4 text-black/20 hover:text-black transition-colors">
                                <svg x-show="!showPassword" class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.523 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>
                                <svg x-show="showPassword" x-cloak class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.477 3 10 3a9.991 9.991 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd"/><path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z"/></svg>
                            </button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] mono font-bold text-black/40 uppercase mb-2 ml-1">Confirm Key</label>
                        <input :type="showPassword ? 'text' : 'password'" x-model="confirmPassword" required placeholder="••••••••" 
                            class="w-full bg-black/5 border-none rounded-xl py-3 px-4 text-sm font-medium focus:bg-white transition-all outline-none border border-transparent focus:border-black/10">
                    </div>
                </div>
                <button type="submit" :disabled="isLoading" 
                    class="md:col-span-2 bg-black text-white rounded-xl py-4 text-xs font-bold uppercase tracking-widest transition-all flex items-center justify-center gap-3 active:scale-[0.98] disabled:opacity-70">
                    <span x-show="isLoading" class="spinner"></span>
                    <span x-text="isLoading ? 'Generating Identity...' : 'Generate Identity'"></span>
                </button>
            </form>
        </div>

        <p class="mt-8 text-center text-sm text-black/40 font-medium">
            Already have an identity? 
            <a href="login.html" class="text-black font-bold hover:underline">Log In</a>
        </p>
    </div>

    <script src="{{url_for('static', path='js/base.js')}}"></script>
    <script src="{{url_for('static',path='js/register.js')}}"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/csp@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
